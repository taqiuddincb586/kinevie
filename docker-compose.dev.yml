version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kinevie-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: kinevie
      POSTGRES_USER: kinevie
      POSTGRES_PASSWORD: kinevie_dev_password
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kinevie"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: node:20-alpine
    container_name: kinevie-backend-dev
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://kinevie:kinevie_dev_password@postgres:5432/kinevie
      JWT_SECRET: dev_secret_not_for_production
      JWT_EXPIRES_IN: 7d
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: kinevie-frontend-dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_dev_data:
