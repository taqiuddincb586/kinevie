version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kinevie-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kinevie
      POSTGRES_USER: kinevie
      POSTGRES_PASSWORD: kinevie_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kinevie"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kinevie-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://kinevie:kinevie_dev_password@postgres:5432/kinevie
      JWT_SECRET: change_this_to_a_long_random_secret_in_production
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
